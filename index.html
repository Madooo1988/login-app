<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2S Fiber - بوابة المشتركين</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #010c1c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .bg-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a2d5e 0%, #010c1c 100%);
            z-index: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px; padding: 40px 25px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.12);
            width: 85%; max-width: 320px;
            text-align: center; color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 10; position: relative;
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        img.logo { 
            width: 100px; height: 100px; border-radius: 25px; 
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: pulseLogo 3s infinite ease-in-out;
        }

        h2 { margin: 0 0 8px 0; font-size: 24px; font-weight: 700; }
        p.welcome { font-size: 13px; opacity: 0.7; margin-bottom: 25px; }

        .btn {
            display: block; padding: 16px;
            background: linear-gradient(135deg, #007bff 0%, #004085 100%);
            color: white; text-decoration: none; border-radius: 18px;
            font-weight: 700; font-size: 18px;
            box-shadow: 0 8px 20px rgba(0,123,255,0.3);
            margin-bottom: 30px;
            animation: pulseBtn 2s infinite;
        }

        /* قسم خدمة العملاء */
        .support-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }
        .support-title { font-size: 12px; opacity: 0.5; margin-bottom: 12px; letter-spacing: 1px; }
        .contact-row { 
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
        }
        .contact-item {
            display: flex; align-items: center; gap: 6px;
            color: #4db8ff; text-decoration: none; font-size: 14px; font-weight: 600;
            background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px;
            transition: 0.3s;
        }
        .contact-item:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(0,123,255,0.6); } 70% { box-shadow: 0 0 0 12px rgba(0,123,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,123,255,0); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="glass-card">
        <img src="logo.png" alt="2S Fiber" class="logo">
        <h2>🌐 شبكة تو إس - فايبر</h2>
        <p class="welcome">👋 مرحباً بك في لوحة التحكم</p>
        
        <a href="http://my.2s.org:7404/user/login.php" target="_blank" class="btn">🚀 اضغط للدخول</a>

        <div class="support-section">
            <div class="support-title">🛠️ خدمة العملاء والدعم الفني</div>
            <div class="contact-row">
                <a href="tel:774465818" class="contact-item">📞 774465818</a>
                <a href="tel:771926657" class="contact-item">📞 771926657</a>
            </div>
        </div>
    </div>
</body>
</html>
