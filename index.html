<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2S Fiber - لوحة التحكم</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="2S Fiber">

    <style>
        /* إعدادات الشاشة الكاملة والديناميكية */
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            background: #021c3c; /* لون الخلفية الداكن والأنيق */
            background: radial-gradient(circle, #0a2d5e 0%, #010c1c 100%);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica', sans-serif;
            display: flex; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        /* تنسيق "بطاقة الزر" بتصميم Glassmorphism العصرى */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            width: 85%; max-width: 320px;
            transition: all 0.4s ease;
            position: relative;
            opacity: 0; animation: fadeIn 0.8s ease forwards 0.2s;
            z-index: 10;
        }

        /* مؤثر حركة بسيط عند التحميل لتبدو الصفحة حيّة */
        .glass-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(0,123,255,0.3), transparent);
            border-radius: 32px; z-index: -1; animation: borderGlow 3s linear infinite;
        }

        /* تنسيق اللوجو والمؤثرات */
        img.logo { width: 110px; height: 110px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: transform 0.3s; }
        .logo-ring { position: relative; display: inline-block; }
        .logo-ring::after { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 29px; border: 2px dashed rgba(0,123,255,0.4); animation: rotateRing 8s linear infinite; }

        /* تنسيق النصوص */
        h2 { margin: 10px 0; font-size: 24px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; line-height: 1.5; }

        /* تنسيق "زر الدخول" - تصميم عصري وديناميكي */
        .btn {
            display: block;
            padding: 18px;
            background: #007bff;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 6px 20px rgba(0,123,255,0.5);
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            overflow: hidden;
        }

        /* مؤثر الوميض على الزر عند مرور المؤشر */
        .btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg); transition: left 0.5s ease-in-out;
        }

        /* تأثيرات حركية ديناميكية وسلسة */
        .glass-card:active { transform: scale(0.98); }
        .btn:hover::after { left: 150%; }
        .btn:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(0,123,255,0.6); }

        /* الإطار الداخلي لإخفاء الراديوس بملء الشاشة */
        iframe { border: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 0.5s ease 0.3s; }
        
        /* وضع "التطبيق" (بملء الشاشة) */
        @media (display-mode: standalone) {
            .glass-card { display: none; }
            iframe { display: block; opacity: 1; z-index: 10; }
        }

        /* تعريف الحركات (Animations) */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes borderGlow { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        @keyframes rotateRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="logo-ring">
            <img src="logo.png" alt="2S Fiber" class="logo">
        </div>
        <h2>شبكة 2S Fiber</h2>
        <p>مرحباً بك في نظام إدارة الحسابات.<br>اضغط أدناه للدخول للوحة التحكم</p>
        <a href="http://23.94.120.164:7404/user/login.php" class="btn">دخول للمشتركين</a>
    </div>

</body>
</html>
